<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block titulo %}Sistema Droguería{% endblock %}</title>

    {# Bootstrap 5 #}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    {# Bootstrap Icons #}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    {% load static %}
    <link rel="stylesheet" href="{% static 'core/css/estilos.css' %}">

    {% block estilos_extra %}{% endblock %}
</head>
<body>

    <div class="d-flex" style="min-height: 100vh;">

        {% include "core/sidebar.html" %}

        <div class="flex-grow-1 d-flex flex-column bg-light">
            <main class="flex-grow-1 p-4">

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                {% block contenido %}{% endblock %}

            </main>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmCBhBaAaUCdB0SuFmSR/iIbc5Gn" crossorigin="anonymous"></script>
    <script src="{% static 'core/js/main.js' %}"></script>

    {% block scripts_extra %}{% endblock %}

</body>
</html>
